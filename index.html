<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Super Komputer</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- SEO & Description -->
    <meta name="description" content="Aplikasi Manajemen Servis Toko Super Komputer Balikpapan" />
    <meta name="author" content="Super Komputer Balikpapan" />
    <meta name="keywords" content="servis laptop, service center, super komputer, balikpapan" />

    <!-- Theme Color (Android Chrome & PC) -->
    <meta name="theme-color" content="#2563eb" />

    <!-- ── iOS / Safari PWA ──────────────────────────────────────────────── -->
    <!-- Izinkan mode fullscreen di iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Nama yang muncul di bawah ikon di Home Screen -->
    <meta name="apple-mobile-web-app-title" content="SuperKomp" />
    <!-- Style status bar iOS: default = putih, black = hitam, black-translucent = transparan -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Ikon untuk Home Screen iOS -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Splash screen iOS (ukuran paling umum — tambahkan lebih jika perlu) -->
    <link
      rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/apple-touch-icon.png"
    />

    <!-- ── Windows / Microsoft ────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="msapplication-config" content="none" />

    <!-- ── Open Graph ──────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Super Komputer — Service Center Balikpapan" />
    <meta property="og:description" content="Aplikasi Manajemen Servis Toko Super Komputer Balikpapan" />
    <meta property="og:image" content="/icon-512.png" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Super Komputer" />
    <meta name="twitter:description" content="Aplikasi Manajemen Servis Toko Super Komputer Balikpapan" />
    <meta name="twitter:image" content="/icon-512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
