<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SUMTRA</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- ── Preconnect: mempercepat koneksi ke resource eksternal ─────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="dns-prefetch" href="https://wytbkueaymkpbwmbvkul.supabase.co" />

  <!-- SEO & Description -->
  <meta name="description" content="SUMTRA - Super Ultima Management, Tracking & Real-Time Application" />
  <meta name="author" content="Super Komputer Balikpapan" />
  <meta name="keywords" content="servis laptop, service center, super komputer, balikpapan" />

  <!-- Theme Color (Android Chrome & PC) -->
  <meta name="theme-color" content="#2563eb" />

  <!-- ── iOS / Safari PWA ──────────────────────────────────────────────── -->
  <!-- Izinkan mode fullscreen di iOS -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- Nama yang muncul di bawah ikon di Home Screen -->
  <meta name="apple-mobile-web-app-title" content="SUMTRA" />
  <!-- Style status bar iOS: default = putih, black = hitam, black-translucent = transparan -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- Ikon untuk Home Screen iOS -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <!-- Splash screen iOS (ukuran paling umum — tambahkan lebih jika perlu) -->
  <link rel="apple-touch-startup-image"
    media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
    href="/apple-touch-icon.png" />

  <!-- ── Windows / Microsoft ────────────────────────────────────────────── -->
  <meta name="msapplication-TileColor" content="#2563eb" />
  <meta name="msapplication-TileImage" content="/superkomputer.png" />
  <meta name="msapplication-config" content="none" />

  <!-- ── Open Graph ──────────────────────────────────────────────────────── -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="SUMTRA — Service Center Balikpapan" />
  <meta property="og:description" content="SUMTRA - Super Ultima Management, Tracking & Real-Time Application" />
  <meta property="og:image" content="/sumtra.png" />

  <!-- ── Twitter Card ─────────────────────────────────────────────────────── -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="SUMTRA" />
  <meta name="twitter:description" content="SUMTRA - Super Ultima Management, Tracking & Real-Time Application" />
  <meta name="twitter:image" content="/sumtra.png" />

  <!-- ── Inline Splash Screen CSS ─────────────────────────────────────── -->
  <!-- Menampilkan loading indicator SEBELUM JavaScript dimuat -->
  <!-- Mengurangi perceived load time dan membuat install terasa instan -->
  <style>
    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #020617;
      transition: opacity 0.3s ease-out;
    }

    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash-screen img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      animation: splash-pulse 1.5s ease-in-out infinite;
    }

    #splash-screen p {
      margin-top: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }

    @keyframes splash-pulse {
      0%, 100% { opacity: 0.6; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
  <!-- Splash screen: tampil langsung saat HTML dimuat, disembunyikan oleh React -->
  <div id="splash-screen">
    <img src="/sumtra.gif" alt="SUMTRA" />
    <p>Memuat aplikasi SUMTRA...</p>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Sembunyikan splash screen setelah React dimuat -->
  <script>
    // Sembunyikan splash screen setelah DOMContentLoaded atau setelah max 3 detik
    function hideSplash() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 350);
      }
    }
    // Sembunyikan saat React render selesai (root tidak kosong)
    var observer = new MutationObserver(function () {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        observer.disconnect();
        hideSplash();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });
    // Fallback: max 4 detik
    setTimeout(hideSplash, 4000);
  </script>
</body>

</html>
